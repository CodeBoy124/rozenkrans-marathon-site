media:
  input: public
  output: /

content:
  - name: configuration
    label: Configuratie
    type: file
    path: src/pageconfig.json
    fields:
      - name: socials
        type: object
        list:
          min: 1
          collapsible:
            collapsed: true
            summary: "{titel}"
        fields:
          - name: titel
            type: string
            required: false
            description: Dit komt niet op de echte website.
          - name: link
            type: string
            required: true
            description: Een link naar het social media account, dus http(s)://...
          - name: icon
            type: string
            required: true
            description: Zoek op "https://icon-sets.iconify.design/ic/" naar een icoontje en plak de "Icon name" hier
          - name: voorgrond
            type: string
            required: false
            description: De voorgrond van het icoontje. Het makkelijkste is om gewoon een kleur als \#000000 neer te zetten, maar gradients zijn ook mogelijk (via CSS)
          - name: achtergrond
            type: string
            required: true
            description: De achtergrond van het icoontje. Het makkelijkste is om gewoon een kleur als \#FFFFFF neer te zetten, maar gradients zijn ook mogelijk (via CSS)
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    fields:
      - name: titel
        type: string
        required: true
      - name: soort
        type: select
        required: true
        options:
          values: [Evenement, Lezing, Overig]
      - name: created_at
        label: gemaakt op
        type: date
        required: true
      - name: cover_image
        label: cover afbeelding
        type: image
        required: true
        description: De afbeelding die bovenaan de post te zien is
      - name: galarij
        type: image
        required: false
        options:
          multiple: true
      - name: body
        type: rich-text
        required: true
        options:
          format: markdown
          media: false
