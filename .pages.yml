            component: seo
            required: true
          - name: body
            type: rich-text
            required: true
            options:
              format: markdown
              media: false
      - name: en-faq
        label: FAQ (Vaak gestelde vragen)
        type: file
        path: src/content/en/faq.md
        fields:
          - name: items
            label: Vraag/antwoord lijst
            type: object
            required: true
