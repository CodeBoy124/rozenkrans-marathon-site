media:
  input: public
  output: /

content:
  - name: configuration
    label: Configuratie
    type: file
    path: src/pageconfig.json
    fields:
      - name: socials
        type: object
        list:
          min: 1
          collapsible:
            collapsed: true
            summary: "{icon} ({link})"
        fields:
          - name: link
            type: string
          - name: icon
            type: string
          - name: achtergrond
            type: string
