            fields:
              - name: question
                label: Vraag
                type: string
                required: true
              - name: answer
                label: Antwoord
                type: text
                required: true
          - name: seo
            label: SEO
            component: seo
            required: true
          - name: body
            type: rich-text
            required: true
            options:
              format: markdown
              media: false
      - name: en-upcomming-event
        label: Komend evenement
        type: file
        path: src/content/en/upcomming-event.md
        fields:
          - name: image
            label: Omslagafbeelding
            type: image
            required: false
          - name: signup_url
            label: URL voor Registratie
            description: Bijvoorbeeld voor Google Forms
            type: string
